<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PotterDex Pro - Directorio Mágico</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo">
            <h1>PotterDex</h1>
            <p>Hechizado por Alexa Ortega</p>
        </div>
        <div class="controles">
            <input type="text" id="buscador" placeholder="Buscar nombre o actor...">
            <select id="filtroCasa">
                <option value="">Todas las Casas</option>
                <option value="Gryffindor">Gryffindor</option>
                <option value="Hufflepuff">Hufflepuff</option>
                <option value="Ravenclaw">Ravenclaw</option>
                <option value="Slytherin">Slytherin</option>
            </select>
        </div>
    </header>

    <main id="contenedor">
        </main>

    <div id="modalMagico" class="modal-overlay">
        <div class="modal-contenido">
            <span id="cerrarModal" class="boton-cerrar">&times;</span>
            <div id="detallePersonaje">
                </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
